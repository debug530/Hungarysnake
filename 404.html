<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>页面未找到 - 贪吃蛇大冒险</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #4ecdc4;
        }
        p {
            font-size: 18px;
            margin-bottom: 30px;
            max-width: 600px;
            line-height: 1.6;
        }
        a {
            display: inline-block;
            padding: 12px 24px;
            background: #ff6b6b;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        a:hover {
            background: #ff4757;
            transform: translateY(-2px);
        }
        .snake-icon {
            font-size: 80px;
            margin-bottom: 30px;
            color: #4ecdc4;
        }
    </style>
</head>
<body>
    <div class="snake-icon">🐍</div>
    <h1>404 - 页面未找到</h1>
    <p>哎呀！贪吃蛇好像迷路了，没有找到您要访问的页面。</p>
    <p>可能是页面已被移动、删除，或者您输入的地址有误。</p>
    <a href="/">返回游戏主页</a>
</body>
</html>
